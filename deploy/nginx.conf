# ArcheryTrade nginx — frontend static + /api backend proxy
# /etc/nginx/sites-available/archerytrade  olarak koy,
# sonra: ln -s ../sites-available/archerytrade /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name _;   # kendi domainini yaz: archerytrade.com

    # Frontend (Vite build çıktısı)
    root /opt/archery-trade/dist;
    index index.html;

    # SPA: bilinmeyen yolları index.html'e döndür
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API'yi backend'e proxy'le
    location /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # statik varlıklar için cache
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# HTTPS için (Certbot/Let's Encrypt sonrası otomatik 443 bloğu eklenir):
#   sudo certbot --nginx -d archerytrade.com
